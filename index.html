<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Priority Board">
<title>Priority Board — Real Kredit Group</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #161618;
  --surface2: #1e1e21;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0efe8;
  --muted: #888884;
  --accent: #c8f060;
  --accent-dim: rgba(200,240,96,0.12);
  --amber: #f0a030;
  --amber-dim: rgba(240,160,48,0.12);
  --red: #e05050;
  --red-dim: rgba(224,80,80,0.12);
  --blue: #60a8f0;
  --blue-dim: rgba(96,168,240,0.12);
  --purple: #a080f0;
  --purple-dim: rgba(160,128,240,0.12);
  --gold: #e8b840;
  --gold-dim: rgba(232,184,64,0.12);
  --teal: #40c8a0;
  --teal-dim: rgba(64,200,160,0.12);
  --pink: #e060a0;
  --pink-dim: rgba(224,96,160,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif; font-size: 14px; min-height: 100vh; }

/* SYNC BAR */
.sync-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 3px; background: transparent;
}
.sync-bar.loading { background: linear-gradient(90deg, transparent, var(--accent), transparent); background-size: 200%; animation: shimmer 1s infinite; }
.sync-bar.error { background: var(--red); }
.sync-bar.ok { background: var(--accent); animation: fadeout 1.5s forwards; }
@keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }
@keyframes fadeout { 0%{opacity:1} 100%{opacity:0} }

.sync-status {
  position: fixed; bottom: 20px; right: 20px; z-index: 200;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 8px 14px;
  font-size: 11px; font-family: 'DM Mono', monospace; 
  color: var(--muted); display: none; align-items: center; gap: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.sync-status.show { display: flex; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sync-status.err .sync-dot { background: var(--red); animation: none; }

.header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.header-left h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; letter-spacing: -0.3px; color: var(--text); line-height: 1.1; }
.header-left p { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
.header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.view-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.view-btn { background: none; border: none; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: 'Geist', sans-serif; transition: all 0.15s; }
.view-btn.active { background: var(--surface); color: var(--text); }
.btn-add { background: var(--accent); color: #0e0e0f; border: none; padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Geist', sans-serif; transition: opacity 0.15s; }
.btn-add:hover { opacity: 0.85; }

.filters { padding: 14px 32px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 11px; color: var(--muted); margin-right: 4px; font-family: 'DM Mono', monospace; }
.cat-filter { background: none; border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: 'Geist', sans-serif; transition: all 0.15s; }
.cat-filter:hover { border-color: var(--border2); color: var(--text); }
.cat-filter.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.stats { padding: 16px 32px; display: flex; gap: 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-val { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
.stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

.table-container { padding: 20px 32px; }
.table-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 700px; }
thead { background: var(--surface2); }
th { padding: 10px 12px; text-align: left; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; font-family: 'DM Mono', monospace; white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--text); }
th.sorted { color: var(--accent); }
td { padding: 10px 12px; border-top: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
tr.done-row td { opacity: 0.38; }
tr.done-row .project-name { text-decoration: line-through; }
tr:hover td { background: rgba(255,255,255,0.02); }

.check-wrap { display: flex; align-items: center; justify-content: center; }
.check-box { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.check-box:hover { border-color: var(--accent); }
.check-box.checked { background: var(--accent); border-color: var(--accent); }
.check-box.checked::after { content: '✓'; font-size: 12px; color: #0e0e0f; font-weight: 700; }

.project-name { font-weight: 500; color: var(--text); font-size: 13px; }
.project-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.badge { display: inline-block; font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
.badge-re   { background: var(--blue-dim);   color: var(--blue);   border: 1px solid rgba(96,168,240,0.2); }
.badge-auto { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(224,80,80,0.2); }
.badge-gold { background: var(--gold-dim);   color: var(--gold);   border: 1px solid rgba(232,184,64,0.2); }
.badge-fin  { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(160,128,240,0.2); }
.badge-med  { background: var(--teal-dim);   color: var(--teal);   border: 1px solid rgba(64,200,160,0.2); }
.badge-tvm  { background: var(--pink-dim);   color: var(--pink);   border: 1px solid rgba(224,96,160,0.2); }

.stars { display: flex; gap: 2px; }
.star { width: 9px; height: 9px; border-radius: 50%; }
.star.on { background: var(--text); }
.star.off { background: var(--border2); }

.lev-wrap { display: flex; align-items: center; gap: 6px; }
.lev-score { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.lev-bar { height: 3px; border-radius: 2px; width: 40px; background: var(--border2); overflow: hidden; }
.lev-fill { height: 100%; border-radius: 2px; }
.lev-high .lev-score { color: var(--accent); } .lev-high .lev-fill { background: var(--accent); }
.lev-med  .lev-score { color: var(--amber); }  .lev-med  .lev-fill { background: var(--amber); }
.lev-low  .lev-score { color: var(--red); }    .lev-low  .lev-fill { background: var(--red); }

.status { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.dot-wait   { background: var(--amber); }
.dot-plan   { background: var(--muted); }
.dot-done   { background: var(--border2); }

.deadline { font-size: 11px; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
.dl-ok   { color: var(--muted); }
.dl-soon { background: var(--amber-dim); color: var(--amber); }
.dl-over { background: var(--red-dim);   color: var(--red); }
.dl-none { color: var(--border2); }

.owner-pill { font-size: 11px; color: var(--muted); }

.row-actions { display: flex; gap: 5px; opacity: 0; transition: opacity 0.15s; }
tr:hover .row-actions { opacity: 1; }
.icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 12px; transition: all 0.15s; }
.icon-btn:hover { color: var(--text); border-color: var(--border2); }

.kanban { padding: 20px 32px; display: none; }
.kanban.active { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.kanban-col { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.kanban-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.kanban-title { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
.kanban-count { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; color: var(--muted); font-family: 'DM Mono', monospace; }
.kanban-cards { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.kanban-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
.kanban-card:hover { border-color: var(--border2); }
.kanban-card.done-card { opacity: 0.35; }
.kanban-card-name { font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 540px; padding: 28px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 6px; display: block; font-family: 'DM Mono', monospace; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'Geist', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--border2); }
.form-input option { background: var(--surface2); }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.rating-input { display: flex; gap: 6px; }
.rating-star { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; font-weight: 500; transition: all 0.15s; }
.rating-star.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
.btn-cancel { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 18px; color: var(--muted); cursor: pointer; font-family: 'Geist', sans-serif; font-size: 13px; }
.btn-cancel:hover { color: var(--text); }
.btn-save { background: var(--accent); color: #0e0e0f; border: none; border-radius: 8px; padding: 8px 20px; font-weight: 600; cursor: pointer; font-family: 'Geist', sans-serif; font-size: 13px; }
.btn-save:hover { opacity: 0.85; }
.empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
.done-section-header { padding: 10px 16px; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; border-top: 1px solid var(--border); }

/* LOADING SCREEN */
.loader { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loader-ring { width: 36px; height: 36px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

@media (max-width: 600px) {
  .header { padding: 20px 16px 16px; }
  .filters, .stats, .table-container, .kanban { padding-left: 16px; padding-right: 16px; }
  .stat-val { font-size: 16px; }
  .header-left h1 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="sync-bar" id="sync-bar"></div>

<div class="sync-status" id="sync-status">
  <div class="sync-dot"></div>
  <span id="sync-text">Ukládám...</span>
</div>

<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Načítám data...</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>Priority Board</h1>
    <p>REAL KREDIT GROUP &mdash; <span id="date-str"></span></p>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('table',this)">Tabulka</button>
      <button class="view-btn" onclick="setView('kanban',this)">Kanban</button>
    </div>
    <button class="btn-add" onclick="openModal()">+ Nový projekt</button>
  </div>
</div>

<div class="filters">
  <span class="filter-label">FILTR:</span>
  <button class="cat-filter active" onclick="setFilter('all',this)">Vše</button>
  <button class="cat-filter" onclick="setFilter('re',this)">Real Estate</button>
  <button class="cat-filter" onclick="setFilter('auto',this)">Automotive</button>
  <button class="cat-filter" onclick="setFilter('gold',this)">Gold</button>
  <button class="cat-filter" onclick="setFilter('fin',this)">Finance</button>
  <button class="cat-filter" onclick="setFilter('med',this)">Mediskont</button>
  <button class="cat-filter" onclick="setFilter('tvm',this)">TVM/TVS</button>
</div>

<div class="stats">
  <div class="stat"><span class="stat-val" id="stat-total" style="color:var(--text)">—</span><span class="stat-label">Projektů</span></div>
  <div class="stat"><span class="stat-val" id="stat-active" style="color:var(--accent)">—</span><span class="stat-label">Aktivní</span></div>
  <div class="stat"><span class="stat-val" id="stat-wait" style="color:var(--amber)">—</span><span class="stat-label">Čeká</span></div>
  <div class="stat"><span class="stat-val" id="stat-done" style="color:var(--muted)">—</span><span class="stat-label">Hotovo</span></div>
  <div class="stat"><span class="stat-val" id="stat-over" style="color:var(--red)">—</span><span class="stat-label">Po termínu</span></div>
  <div class="stat"><span class="stat-val" id="stat-lev" style="color:var(--accent)">—</span><span class="stat-label">Avg. Leverage</span></div>
</div>

<div class="table-container" id="table-view">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px;cursor:default"></th>
          <th onclick="sortBy('name')">Projekt</th>
          <th onclick="sortBy('cat')">Kategorie</th>
          <th onclick="sortBy('dopad')">Dopad</th>
          <th onclick="sortBy('usili')">Úsilí</th>
          <th onclick="sortBy('leverage')" class="sorted">Leverage ↓</th>
          <th onclick="sortBy('deadline')">Deadline</th>
          <th onclick="sortBy('owner')">Ručitel</th>
          <th onclick="sortBy('status')">Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div class="kanban" id="kanban-view">
  <div class="kanban-col">
    <div class="kanban-header"><span class="kanban-title">🟢 Aktivní</span><span class="kanban-count" id="k-active-count">0</span></div>
    <div class="kanban-cards" id="k-active"></div>
  </div>
  <div class="kanban-col">
    <div class="kanban-header"><span class="kanban-title">🟡 Čeká</span><span class="kanban-count" id="k-wait-count">0</span></div>
    <div class="kanban-cards" id="k-wait"></div>
  </div>
  <div class="kanban-col">
    <div class="kanban-header"><span class="kanban-title">⚫ Plánováno</span><span class="kanban-count" id="k-plan-count">0</span></div>
    <div class="kanban-cards" id="k-plan"></div>
  </div>
  <div class="kanban-col">
    <div class="kanban-header"><span class="kanban-title">✅ Hotovo</span><span class="kanban-count" id="k-done-count">0</span></div>
    <div class="kanban-cards" id="k-done"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Nový projekt</h2>
    <div class="form-row">
      <label class="form-label">NÁZEV PROJEKTU</label>
      <input class="form-input" id="f-name" placeholder="např. Budova A — financování" />
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">KATEGORIE</label>
        <select class="form-input" id="f-cat">
          <option value="re">Real Estate</option>
          <option value="auto">Automotive</option>
          <option value="gold">Gold</option>
          <option value="fin">Finance</option>
          <option value="med">Mediskont</option>
          <option value="tvm">TVM/TVS</option>
        </select>
      </div>
      <div>
        <label class="form-label">STATUS</label>
        <select class="form-input" id="f-status">
          <option value="active">Aktivní</option>
          <option value="wait">Čeká na akci</option>
          <option value="plan">Plánováno</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">DOPAD (1–5)</label>
        <div class="rating-input" id="r-dopad"></div>
      </div>
      <div>
        <label class="form-label">ÚSILÍ (1–5)</label>
        <div class="rating-input" id="r-usili"></div>
      </div>
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">RUČITEL</label>
        <input class="form-input" id="f-owner" placeholder="např. Tony" />
      </div>
      <div>
        <label class="form-label">DEADLINE</label>
        <input class="form-input" id="f-deadline" type="date" />
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">DALŠÍ KONKRÉTNÍ KROK</label>
      <input class="form-input" id="f-next" placeholder="Co udělat jako první?" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Zrušit</button>
      <button class="btn-save" onclick="saveProject()">Uložit</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx-9c9_-dCmOC4AvRCl9lApCFHgYTtF_ZeQDuPExWX7y26na8m7KyiqxYFaP36FIgo8mQ/exec';

const CAT_LABELS = { re:'Real Estate', auto:'Automotive', gold:'Gold', fin:'Finance', med:'Mediskont', tvm:'TVM/TVS' };
const CAT_CLASS  = { re:'badge-re', auto:'badge-auto', gold:'badge-gold', fin:'badge-fin', med:'badge-med', tvm:'badge-tvm' };
const STATUS_LABELS = { active:'Aktivní', wait:'Čeká', plan:'Plánováno', done:'Hotovo' };
const STATUS_DOT    = { active:'dot-active', wait:'dot-wait', plan:'dot-plan', done:'dot-done' };

let projects = [];
let currentFilter = 'all';
let sortCol = 'leverage';
let sortDir = -1;
let editId = null;
let ratingVals = { dopad:3, usili:2 };
let saveTimer = null;

/* ── SYNC ── */
function setSyncBar(state) {
  const b = document.getElementById('sync-bar');
  b.className = 'sync-bar ' + state;
}
function showSyncStatus(msg, err=false) {
  const el = document.getElementById('sync-status');
  document.getElementById('sync-text').textContent = msg;
  el.className = 'sync-status show' + (err?' err':'');
  clearTimeout(el._t);
  if (!err) el._t = setTimeout(() => el.className='sync-status', 2500);
}

async function loadFromSheets() {
  setSyncBar('loading');
  try {
    const r = await fetch(API);
    const data = await r.json();
    projects = data.map(row => ({
      id:       Number(row.id) || Date.now(),
      name:     row.name || '',
      cat:      row.cat || 're',
      dopad:    Number(row.dopad) || 3,
      usili:    Number(row.usili) || 2,
      status:   row.status || 'active',
      owner:    row.owner || '',
      deadline: row.deadline || '',
      next:     row.next || '',
      done:     row.done === 'true' || row.done === true,
    }));
    setSyncBar('ok');
    document.getElementById('loader').style.display = 'none';
    render();
  } catch(e) {
    setSyncBar('error');
    document.getElementById('loader').innerHTML = '<div style="color:var(--red);font-family:DM Mono,monospace;font-size:13px;text-align:center;padding:20px">Nepodařilo se načíst data.<br>Zkontroluj připojení.</div>';
  }
}

async function saveToSheets() {
  setSyncBar('loading');
  showSyncStatus('Ukládám...');
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify(projects),
      headers: { 'Content-Type': 'application/json' },
      mode: 'no-cors',
    });
    setSyncBar('ok');
    showSyncStatus('Uloženo ✓');
  } catch(e) {
    setSyncBar('error');
    showSyncStatus('Chyba uložení!', true);
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToSheets, 800);
}

/* ── HELPERS ── */
function getLev(p) { return +(p.dopad / p.usili).toFixed(2); }
function getLevClass(l) { return l >= 1.5 ? 'lev-high' : l >= 1.0 ? 'lev-med' : 'lev-low'; }

function deadlineInfo(dl) {
  if (!dl) return { label:'—', cls:'dl-none', ts: Infinity };
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dl);
  const diff = Math.round((d - today) / 86400000);
  const label = d.toLocaleDateString('cs-CZ', { day:'numeric', month:'short' });
  if (diff < 0)   return { label, cls:'dl-over', ts: diff };
  if (diff <= 14) return { label, cls:'dl-soon', ts: diff };
  return { label, cls:'dl-ok', ts: diff };
}

function starsHtml(n) {
  let h = '<div class="stars">';
  for (let i=1;i<=5;i++) h += `<div class="star ${i<=n?'on':'off'}"></div>`;
  return h + '</div>';
}

function filtered() {
  return projects.filter(p => currentFilter === 'all' || p.cat === currentFilter);
}

function sorted(list) {
  const active = list.filter(p => !p.done);
  const done   = list.filter(p => p.done);
  const cmp = (a, b) => {
    let av, bv;
    if      (sortCol==='leverage') { av=getLev(a);  bv=getLev(b); }
    else if (sortCol==='name')     { av=a.name;      bv=b.name; }
    else if (sortCol==='cat')      { av=a.cat;       bv=b.cat; }
    else if (sortCol==='dopad')    { av=a.dopad;     bv=b.dopad; }
    else if (sortCol==='usili')    { av=a.usili;     bv=b.usili; }
    else if (sortCol==='status')   { av=a.status;    bv=b.status; }
    else if (sortCol==='deadline') { av=deadlineInfo(a.deadline).ts; bv=deadlineInfo(b.deadline).ts; }
    else if (sortCol==='owner')    { av=a.owner||''; bv=b.owner||''; }
    if (av < bv) return sortDir; if (av > bv) return -sortDir; return 0;
  };
  return [...active.sort(cmp), ...done];
}

function sortBy(col) {
  if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=-1; }
  render();
}

function toggleDone(id) {
  const p = projects.find(x=>x.id===id);
  if (!p) return;
  p.done = !p.done;
  p.status = p.done ? 'done' : 'active';
  render();
  scheduleSave();
}

/* ── RENDER ── */
function render() { renderStats(); renderTable(); renderKanban(); }

function renderStats() {
  const list = filtered();
  document.getElementById('stat-total').textContent  = list.length;
  document.getElementById('stat-active').textContent = list.filter(p=>p.status==='active').length;
  document.getElementById('stat-wait').textContent   = list.filter(p=>p.status==='wait').length;
  document.getElementById('stat-done').textContent   = list.filter(p=>p.done).length;
  document.getElementById('stat-over').textContent   = list.filter(p=>!p.done && p.deadline && deadlineInfo(p.deadline).cls==='dl-over').length;
  const active = list.filter(p=>!p.done);
  document.getElementById('stat-lev').textContent = active.length ? (active.reduce((s,p)=>s+getLev(p),0)/active.length).toFixed(2) : '—';
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const list = sorted(filtered());
  if (!list.length) { tbody.innerHTML=`<tr><td colspan="10"><div class="empty-state">Žádné projekty.</div></td></tr>`; return; }
  let html = ''; let doneShown = false;
  list.forEach(p => {
    if (p.done && !doneShown) {
      html += `<tr><td colspan="10" class="done-section-header">✅ Hotové projekty</td></tr>`;
      doneShown = true;
    }
    const lev = getLev(p);
    const lc  = getLevClass(lev);
    const levPct = Math.min(100, (lev/3)*100).toFixed(0);
    const dl = deadlineInfo(p.deadline);
    html += `<tr class="${p.done?'done-row':''}">
      <td class="check-wrap"><div class="check-box ${p.done?'checked':''}" onclick="toggleDone(${p.id})"></div></td>
      <td><div class="project-name">${p.name}</div><div class="project-sub">${p.next}</div></td>
      <td><span class="badge ${CAT_CLASS[p.cat]}">${CAT_LABELS[p.cat]}</span></td>
      <td>${starsHtml(p.dopad)}</td>
      <td>${starsHtml(p.usili)}</td>
      <td><div class="lev-wrap ${lc}"><span class="lev-score">${lev}</span><div class="lev-bar"><div class="lev-fill" style="width:${levPct}%"></div></div></div></td>
      <td><span class="deadline ${dl.cls}">${dl.label}</span></td>
      <td><span class="owner-pill">${p.owner||'—'}</span></td>
      <td><span class="status"><span class="dot ${STATUS_DOT[p.status]||'dot-done'}"></span>${STATUS_LABELS[p.status]||'Hotovo'}</span></td>
      <td><div class="row-actions">
        <div class="icon-btn" onclick="editProject(${p.id})">✎</div>
        <div class="icon-btn" onclick="deleteProject(${p.id})" style="color:var(--red)">×</div>
      </div></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function renderKanban() {
  const list = filtered();
  ['active','wait','plan','done'].forEach(s => {
    const col = list.filter(p => p.done ? s==='done' : p.status===s);
    const el  = document.getElementById(`k-${s}`);
    const cnt = document.getElementById(`k-${s}-count`);
    if (!el) return;
    cnt.textContent = col.length;
    if (!col.length) { el.innerHTML='<div style="padding:12px;color:var(--muted);font-size:12px;text-align:center">Prázdno</div>'; return; }
    el.innerHTML = col.map(p => {
      const lev = getLev(p);
      const dl  = deadlineInfo(p.deadline);
      return `<div class="kanban-card ${p.done?'done-card':''}" onclick="editProject(${p.id})">
        <div class="kanban-card-name">${p.name}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="badge ${CAT_CLASS[p.cat]}">${CAT_LABELS[p.cat]}</span>
          <span class="${getLevClass(lev)}" style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500">${lev}</span>
        </div>
        ${p.deadline?`<div style="margin-top:4px"><span class="deadline ${dl.cls}">${dl.label}</span></div>`:''}
        ${p.owner?`<div style="font-size:11px;color:var(--muted);margin-top:4px">👤 ${p.owner}</div>`:''}
      </div>`;
    }).join('');
  });
}

/* ── UI CONTROLS ── */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.cat-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setView(v, btn) {
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('table-view').style.display = v==='table'?'block':'none';
  document.getElementById('kanban-view').className = 'kanban'+(v==='kanban'?' active':'');
}

function buildRating(elId, field) {
  const el = document.getElementById(elId); el.innerHTML='';
  for (let i=1;i<=5;i++) {
    const btn = document.createElement('div');
    btn.className='rating-star'+(ratingVals[field]>=i?' selected':'');
    btn.textContent=i;
    btn.onclick=()=>{ ratingVals[field]=i; buildRating(elId,field); };
    el.appendChild(btn);
  }
}

function openModal(id=null) {
  editId=id;
  if (id) {
    const p=projects.find(x=>x.id===id);
    document.getElementById('modal-title').textContent='Upravit projekt';
    document.getElementById('f-name').value=p.name;
    document.getElementById('f-cat').value=p.cat;
    document.getElementById('f-status').value=p.done?'active':p.status;
    document.getElementById('f-owner').value=p.owner||'';
    document.getElementById('f-deadline').value=p.deadline||'';
    document.getElementById('f-next').value=p.next;
    ratingVals={dopad:p.dopad,usili:p.usili};
  } else {
    document.getElementById('modal-title').textContent='Nový projekt';
    ['f-name','f-owner','f-next'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-cat').value='re';
    document.getElementById('f-status').value='active';
    document.getElementById('f-deadline').value='';
    ratingVals={dopad:3,usili:2};
  }
  buildRating('r-dopad','dopad');
  buildRating('r-usili','usili');
  document.getElementById('modal').classList.add('open');
}

function editProject(id) { openModal(id); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveProject() {
  const name=document.getElementById('f-name').value.trim();
  if (!name) { alert('Zadej název projektu.'); return; }
  const p = {
    id: editId||Date.now(),
    name,
    cat: document.getElementById('f-cat').value,
    dopad: ratingVals.dopad,
    usili: ratingVals.usili,
    status: document.getElementById('f-status').value,
    owner: document.getElementById('f-owner').value.trim(),
    deadline: document.getElementById('f-deadline').value,
    next: document.getElementById('f-next').value.trim()||'—',
    done: editId ? projects.find(x=>x.id===editId).done : false,
  };
  if (editId) { const i=projects.findIndex(x=>x.id===editId); projects[i]=p; }
  else projects.push(p);
  closeModal();
  render();
  scheduleSave();
}

function deleteProject(id) {
  if (!confirm('Smazat projekt?')) return;
  projects=projects.filter(p=>p.id!==id);
  render();
  scheduleSave();
}

document.getElementById('modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('modal')) closeModal();
});

document.getElementById('date-str').textContent = new Date().toLocaleDateString('cs-CZ',{day:'numeric',month:'long',year:'numeric'});

loadFromSheets();
</script>
